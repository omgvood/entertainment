# Источники событий по городам.
#
# extraction_mode:
#   per_url         — дискавер N URL → N LLM-вызовов на каждое событие
#                     требует: kind + url + (опц.) url_pattern
#   batch_listing   — скачиваем url целиком и одним LLM-вызовом извлекаем все события
#                     требует: kind + url
#   direct_api      — вызываем API провайдера и маппим JSON → ParsedEvent напрямую (без LLM)
#                     требует: provider + api_query + event_type
#   vk_events       — VK-сообщества типа «событие» → ParsedEvent напрямую (без LLM)
#                     требует ПОЛЬЗОВАТЕЛЬСКИЙ токен (groups.search запрещён сервисному ключу) — отключён
#   vk_posts        — посты со стен vk_groups → префильтр → LLM extract_many (1 вызов/группу)
#                     требует: VK_SERVICE_KEY (wall.get) + vk_groups
#   telegram_posts  — посты публичных каналов (t.me/s/) → префильтр → LLM extract_many (1 вызов/канал)
#                     требует: telegram_sources (список каналов; без авторизации)
#   generic         — одобренные в candidate_sources домены → JSON-LD / LLM (длинный хвост)
#
# priority — приоритет при кросс-источниковом merge (выше = побеждает, его карточка остаётся).

cities:
  sochi:
    sources:
      # QuizPlease Сочи
      - name: quizplease
        kind: listing
        url: https://sochi.quizplease.ru/schedule
        url_pattern: "/game-page\\?id=\\d+"
        extraction_mode: batch_listing
        priority: 60

      # 2ГИС — места «всегда» (Сочи)
      - name: twogis-bowling
        extraction_mode: direct_api
        provider: twogis
        api_query: "боулинг Сочи"
        event_type: bowling
        priority: 70

      - name: twogis-billiards
        extraction_mode: direct_api
        provider: twogis
        api_query: "бильярд Сочи"
        event_type: billiards
        priority: 70

      - name: twogis-karting
        extraction_mode: direct_api
        provider: twogis
        api_query: "картинг Сочи"
        event_type: karting
        priority: 70

      # Timepad — широкая афиша: тип события определяется по его категории Timepad
      - name: timepad
        extraction_mode: direct_api
        provider: timepad
        priority: 100

      # VK — события-сообщества (структурированные start_date/place, без LLM).
      # ОТКЛЮЧЁН: groups.search недоступен сервисному ключу mini-app (Access denied, code 15) —
      # нужен ПОЛЬЗОВАТЕЛЬСКИЙ токен. Код (sources/vk.py) и тесты готовы: раскомментировать,
      # если появится user-токен с правом groups.
      # - name: vk-events
      #   extraction_mode: vk_events
      #   priority: 80
      #   # vk_city_id: <проверить через database.getCities("Сочи")>

      # VK — посты кураторских сообществ (свободный текст, через LLM). Работает на сервисном
      # ключе (wall.get доступен). Screen-name'ы афиша-сообществ Сочи (без https://vk.com/).
      - name: vk-posts
        extraction_mode: vk_posts
        priority: 40
        vk_groups:
          - afishasochi24        
          - gidposochi       

      # KudaGo — пилот «широкой афиши» для Сочи. ОТКЛЮЧЁН: данные KudaGo по Сочи
      # устарели (проверено 2026-06-10) — с фильтром actual_since остаётся ~36 записей,
      # все из 2016 г. или без даты (is_startless). Источник возвращает 0 актуальных.
      # Клиент (sources/kudago.py) и диспетчер готовы — раскомментировать, если KudaGo
      # снова начнёт отдавать свежие события по Сочи.
      # - name: kudago
      #   extraction_mode: direct_api
      #   provider: kudago
      #   api_query: "sochi"
      #   priority: 50

      # Telegram — посты публичных каналов Сочи (зеркало perm, без авторизации).
      # Проверка: открой https://t.me/s/<channel> — должны показываться посты.
      - name: telegram-posts
        extraction_mode: telegram_posts
        priority: 45
        telegram_sources:
          - channel: afishasochi24       # афиша-агрегатор Сочи
            source_type: aggregator
            priority: 50
          - channel: gidposochi          # гид по Сочи (дублирует VK-группу) 
            source_type: aggregator
            priority: 50
            enabled: false              # не открывается в web, переход в приложение
          - channel: sochiweekend        # куда сходить в Сочи на выходных — проверено
            source_type: aggregator
            priority: 50
            enabled: true

      # Generic — одобренные кандидаты (длинный хвост). Включить после замера покрытия VK.
      # - name: generic
      #   extraction_mode: generic
      #   priority: 20

  perm:
    sources:
      # QuizPlease: на странице расписания видны все игры → batch_listing
      - name: quizplease
        kind: listing
        url: https://perm.quizplease.ru/schedule
        url_pattern: "/game-page\\?id=\\d+"   # используется только если --mode per_url
        extraction_mode: batch_listing
        priority: 60

      # 2ГИС — места «всегда» (боулинг/бильярд/картинг)
      - name: twogis-bowling
        extraction_mode: direct_api
        provider: twogis
        api_query: "боулинг Пермь"
        event_type: bowling
        priority: 70

      - name: twogis-billiards
        extraction_mode: direct_api
        provider: twogis
        api_query: "бильярд Пермь"
        event_type: billiards
        priority: 70

      - name: twogis-karting
        extraction_mode: direct_api
        provider: twogis
        api_query: "картинг Пермь"
        event_type: karting
        priority: 70

      # Timepad — широкая афиша: тип события определяется по его категории Timepad
      - name: timepad
        extraction_mode: direct_api
        provider: timepad
        priority: 100

      # VK — события-сообщества (структурированные start_date/place, без LLM).
      # ОТКЛЮЧЁН: groups.search недоступен сервисному ключу mini-app (Access denied, code 15) —
      # нужен ПОЛЬЗОВАТЕЛЬСКИЙ токен. Код (sources/vk.py) и тесты готовы: раскомментировать,
      # если появится user-токен с правом groups.
      # - name: vk-events
      #   extraction_mode: vk_events
      #   priority: 80
      #   # vk_city_id: <проверить через database.getCities("Пермь")>

      # VK — посты кураторских сообществ (свободный текст, через LLM). Работает на сервисном
      # ключе (wall.get доступен). Screen-name'ы афиша-сообществ Перми (без https://vk.com/).
      - name: vk-posts
        extraction_mode: vk_posts
        priority: 40
        vk_groups:
          # Агрегаторы (куда сходить)
          - permactive         # активный досуг Перми
          - kudaperm            # куда пойти в Перми
          - prmgo
          - perm_where_to_go
          - permkudapoiti
          # Организаторы — выставки / экскурсии (покрывают пробел ❌→⚠️)
          - permartmuseum        # Пермская государственная художественная галерея
          - permm_museum              # PERMM — музей современного искусства
          # Организаторы — детские события
          - dollpermmuseum     # Пермский театр кукол
          # Организаторы — мастер-классы / арт
          - artspaceperm       # арт-пространства Перми 

      # Telegram — посты публичных каналов (веб-превью t.me/s/, без авторизации).
      # source_type влияет на строгость префильтра: organizer (мало шума) — мягче,
      # aggregator (реклама/мемы/новости) — строже. priority/enabled управляют каналом
      # без правок кода. СПИСОК — СТАРТОВЫЙ, проверить/дополнить вручную (цель 15-20 каналов):
      # открой https://t.me/s/<channel> в браузере и убедись, что превью отдаёт посты.
      - name: telegram-posts
        extraction_mode: telegram_posts
        priority: 45
        telegram_sources:
          # Стендап-организаторы
          - channel: standupperm        # организатор стендапа — проверено
            source_type: organizer
            priority: 90
          # Афиша-агрегаторы
          - channel: kudaperm            # агрегатор — проверено
            source_type: aggregator
            priority: 50
          - channel: afishaperm          # агрегатор — проверено
            source_type: aggregator
            priority: 50
          - channel: happiness_perm             # арт-события Перми (уточнить)
            source_type: aggregator
            priority: 50
            enabled: true
          # Музеи / выставки / экскурсии (покрывают пробел ❌→⚠️)
          # Проверка: открой https://t.me/s/<channel> — должны показываться посты
          - channel: permartmuseum         # Пермская художественная галерея — проверено
            source_type: organizer
            priority: 80
            enabled: true
          - channel: permmmuseum        # PERMM — проверено
            source_type: organizer
            priority: 80
            enabled: true
          # Мастер-классы / арт-пространства

      # Generic — одобренные кандидаты (длинный хвост). Включить после замера покрытия VK.
      # - name: generic
      #   extraction_mode: generic
      #   priority: 20

      # DeepSeek тестовый источник (раскомментировать для локального тестирования)
      # - name: quizplease-deepseek-test
      #   kind: listing
      #   url: https://perm.quizplease.ru/schedule
      #   extraction_mode: batch_listing
      #   provider: deepseek
      #   priority: 0
