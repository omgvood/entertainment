# Источники событий по городам.
#
# extraction_mode:
#   per_url         — дискавер N URL → N LLM-вызовов на каждое событие
#                     требует: kind + url + (опц.) url_pattern
#   batch_listing   — скачиваем url целиком и одним LLM-вызовом извлекаем все события
#                     требует: kind + url
#   direct_api      — вызываем API провайдера и маппим JSON → ParsedEvent напрямую (без LLM)
#                     требует: provider + api_query + event_type

cities:
  sochi:
    sources:
      # QuizPlease Сочи
      - name: quizplease
        kind: listing
        url: https://sochi.quizplease.ru/schedule
        url_pattern: "/game-page\\?id=\\d+"
        extraction_mode: batch_listing

      # 2ГИС — места «всегда» (Сочи)
      - name: twogis-bowling
        extraction_mode: direct_api
        provider: twogis
        api_query: "боулинг Сочи"
        event_type: bowling

      - name: twogis-billiards
        extraction_mode: direct_api
        provider: twogis
        api_query: "бильярд Сочи"
        event_type: billiards

      - name: twogis-karting
        extraction_mode: direct_api
        provider: twogis
        api_query: "картинг Сочи"
        event_type: karting

      # Timepad — широкая афиша: тип события определяется по его категории Timepad
      - name: timepad
        extraction_mode: direct_api
        provider: timepad

      # KudaGo — пилот «широкой афиши» для Сочи. ОТКЛЮЧЁН: данные KudaGo по Сочи
      # устарели (проверено 2026-06-10) — с фильтром actual_since остаётся ~36 записей,
      # все из 2016 г. или без даты (is_startless). Источник возвращает 0 актуальных.
      # Клиент (sources/kudago.py) и диспетчер готовы — раскомментировать, если KudaGo
      # снова начнёт отдавать свежие события по Сочи.
      # - name: kudago
      #   extraction_mode: direct_api
      #   provider: kudago
      #   api_query: "sochi"

  perm:
    sources:
      # QuizPlease: на странице расписания видны все игры → batch_listing
      - name: quizplease
        kind: listing
        url: https://perm.quizplease.ru/schedule
        url_pattern: "/game-page\\?id=\\d+"   # используется только если --mode per_url
        extraction_mode: batch_listing

      # 2ГИС — места «всегда» (боулинг/бильярд/картинг)
      - name: twogis-bowling
        extraction_mode: direct_api
        provider: twogis
        api_query: "боулинг Пермь"
        event_type: bowling

      - name: twogis-billiards
        extraction_mode: direct_api
        provider: twogis
        api_query: "бильярд Пермь"
        event_type: billiards

      - name: twogis-karting
        extraction_mode: direct_api
        provider: twogis
        api_query: "картинг Пермь"
        event_type: karting

      # Timepad — широкая афиша: тип события определяется по его категории Timepad
      - name: timepad
        extraction_mode: direct_api
        provider: timepad

      # DeepSeek тестовый источник (раскомментировать для локального тестирования)
      # - name: quizplease-deepseek-test
      #   kind: listing
      #   url: https://perm.quizplease.ru/schedule
      #   extraction_mode: batch_listing
      #   provider: deepseek
