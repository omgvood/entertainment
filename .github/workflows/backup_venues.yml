name: Backup venues

# Периодический снимок таблицы venues в git. Supabase free tier бекапов не делает,
# поэтому раз в неделю выгружаем SQL и коммитим — восстановление из истории git.
# Воскресенье 04:00 UTC = 07:00 МСК (после ночного парсинга).
on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:  # ручной запуск из UI

jobs:
  backup-venues:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Production

    defaults:
      run:
        working-directory: parser

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: parser/pyproject.toml

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Export venues → SQL
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m parser.cli export-venues --output ../supabase/seeds/venues.sql

      - name: Commit snapshot if changed
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/seeds/venues.sql
          git diff --staged --quiet || git commit -m "chore: venues backup snapshot"
          git push
