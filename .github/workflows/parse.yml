name: Daily parse

# Cron в UTC. 21:00 UTC = 00:00 МСК следующего дня.
on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:  # ручной запуск из UI

jobs:
  parse-cities:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    strategy:
      matrix:
        city: [perm, sochi]
      fail-fast: false  # падение одного города не отменяет другой

    defaults:
      run:
        working-directory: parser

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: parser/pyproject.toml

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run parser — ${{ matrix.city }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TWOGIS_API_KEY: ${{ secrets.TWOGIS_API_KEY }}
          TIMEPAD_TOKEN: ${{ secrets.TIMEPAD_TOKEN }}
          VK_SERVICE_KEY: ${{ secrets.VK_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m parser.cli run --city ${{ matrix.city }}

      - name: Send warning alert
        # Прогон формально успешен, но отдельный источник упал (напр. протух токен Timepad).
        # Парсер пишет parse_warnings_<city>.json — скрипт читает его и шлёт Telegram, иначе сбой невидим.
        if: success()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          WARN_FILE="${GITHUB_WORKSPACE}/parse_warnings_${{ matrix.city }}.json"
          if [ -f "$WARN_FILE" ]; then
            python3 scripts/notify_warnings.py "$WARN_FILE"
          fi

      - name: Notify on failure
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -n "$TG_BOT_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
            curl -s "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT_ID" \
              -d text="❌ Парсер упал (${{ matrix.city }}). Логи: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

  trigger-deploy:
    needs: parse-cities
    if: ${{ !cancelled() && contains(needs.parse-cities.result, 'success') }}
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Trigger Vercel rebuild
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -s -X POST "$VERCEL_DEPLOY_HOOK"
          else
            echo "VERCEL_DEPLOY_HOOK не задан, пропускаем"
          fi
