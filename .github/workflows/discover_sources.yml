name: Discover sources

# Еженедельный поиск новых источников (Discovery). Воскресенье 20:00 UTC = 23:00 МСК.
on:
  schedule:
    - cron: "0 20 * * 0"
  workflow_dispatch:  # ручной запуск из UI

jobs:
  discover-sources:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Production
    strategy:
      matrix:
        city: [perm, sochi]
      fail-fast: false

    defaults:
      run:
        working-directory: parser

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: parser/pyproject.toml

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Discover sources — ${{ matrix.city }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          SEARCH_PROVIDERS: serper,brave,duckduckgo
        run: python -m parser.cli discover-sources --city ${{ matrix.city }}

      - name: Discovery health check — ${{ matrix.city }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        # Падаем (exit 1), если за 7 дней не появилось ни одного нового кандидата — медленная
        # деградация поиска. Быстрый сбой ключей ловит exit 1 шага discover-sources выше.
        run: python -m parser.cli discovery-health --city ${{ matrix.city }}

      - name: Notify on failure
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -n "$TG_BOT_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
            curl -s "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT_ID" \
              -d text="⚠️ Discovery (${{ matrix.city }}) — провайдеры поиска не дали кандидатов. Проверь SERPER_API_KEY / BRAVE_API_KEY. Логи: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
